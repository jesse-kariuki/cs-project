
spring.application.name=posis
spring.datasource.url=jdbc:mariadb://localhost:3306/posis_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Passwords$uck0}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=${JWT_SECRET:613f185844050b1fae42f1c10fda41406f54ed525f1cba9c679f109a2bc507a5}
jwt.accessTokenExpirationMs=900000
jwt.refreshTokenExpirationMs=604800000
jwt.issuer=posis-garage-system
jwt.cookieName=access_token
jwt.refreshCookieName=refresh_token

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
